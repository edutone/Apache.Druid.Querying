name: Build & Publish package to the GitHub Registry

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      Version: ${{ steps.gitversion.outputs.MajorMinorPatch }}
      CommitsSinceVersionSource: ${{ steps.gitversion.outputs.CommitsSinceVersionSource }}
    
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # fetch-depth is needed for GitVersion
      
      # Install and calculate the new version with GitVersion  
      - name: Install GitVersion
        uses: gittools/actions/gitversion/setup@v3.1.11
        with:
          versionSpec: 6.0.5
      - name: Determine Version
        uses: gittools/actions/gitversion/execute@v3.1.11
        id: gitversion # step id used as reference for output values
        with:
          updateAssemblyInfo: true
      - name: Display GitVersion outputs
        run: |
          echo "Version: ${{ steps.gitversion.outputs.MajorMinorPatch }}"
          echo "CommitsSinceVersionSource: ${{ steps.gitversion.outputs.CommitsSinceVersionSource }}"
      
      # Build/pack the project
      - name: Setup .NET
        uses: actions/setup-dotnet@v4.3.0
        with:
          dotnet-version: 7.0.x

      - name: Build and pack package
        run: dotnet pack ${{ vars.CS_PROJ_PATH }} -p:Version='${{ steps.gitversion.outputs.MajorMinorPatch }}' -c Release

      - name: Upload package to GitHub
        uses: actions/upload-artifact@v4.6.0
        with:
          name: PolarisClient
          path: bin/Release/*.nupkg

  release:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'workflow_dispatch' # only run job if on the main branch and on manual trigger
    
    steps:
      # Push NuGet package to GitHub packages
      - name: Download nuget package artifact
        uses: actions/download-artifact@v4.6.0
        with:
          name: PolarisClient
          path: package
      - name: Prep packages
        run: dotnet nuget add source --username ${{ vars.USERNAME }} --password ${{ secrets.GITHUB_TOKEN }} --store-password-in-clear-text --name github "https://nuget.pkg.github.com/${{ vars.USERNAME }}/index.json"
      - name: Push package to GitHub packages
        if: needs.build.outputs.CommitsSinceVersionSource > 0 # Only release if there has been a commit/version change  
        run: dotnet nuget push package/*.nupkg --api-key ${{ secrets.GITHUB_TOKEN }} --source "github"
      
      # Create release
      - name: Create Release
        if: needs.build.outputs.CommitsSinceVersionSource > 0 # only release if there has been a commit/version change
        uses: ncipollo/release-action@v1.15.0
        with:
          tag: ${{ needs.build.outputs.Version }}
          name: ${{ needs.build.outputs.Version }}
          artifacts: "package/*"
          token: ${{ secrets.GITHUB_TOKEN }}
