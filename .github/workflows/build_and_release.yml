name: Build & Publish package to the GitHub Registry

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      Version: ${{ steps.gitversion.outputs.MajorMinorPatch }}
      CommitsSinceVersionSource: ${{ steps.gitversion.outputs.CommitsSinceVersionSource }}
    
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # fetch-depth is needed for GitVersion
      
      # Install and calculate the new version with GitVersion  
      - name: Install GitVersion
        uses: gittools/actions/gitversion/setup@v3.1.11
        with:
          versionSpec: 6.0.5
      - name: Determine Version
        uses: gittools/actions/gitversion/execute@v3.1.11
        id: gitversion # step id used as reference for output values
        with:
          updateAssemblyInfo: true
      - name: Display GitVersion outputs
        run: |
          echo "Version: ${{ steps.gitversion.outputs.MajorMinorPatch }}"
          echo "CommitsSinceVersionSource: ${{ steps.gitversion.outputs.CommitsSinceVersionSource }}"
      
      # Build/pack the project
      - name: Setup .NET
        uses: actions/setup-dotnet@v4.3.0
        with:
          dotnet-version: 7.0.x

      - name: Build and pack main package
        run: dotnet pack Apache.Druid.Querying -p:Version='${{ steps.gitversion.outputs.MajorMinorPatch }}' -c Release
      - name: Build and pack DI package
        run: dotnet pack Apache.Druid.Querying.Microsoft.Extensions.DependencyInjection -p:Version='${{ steps.gitversion.outputs.MajorMinorPatch }}' -c Release
      - name: Upload main package to GitHub
        uses: actions/upload-artifact@v4.6.0
        with:
          name: Schoolday.Polaris.Querying
          path: Apache.Druid.Querying/bin/Release/*.nupkg
      - name: Upload DI package to GitHub
        uses: actions/upload-artifact@v4.6.0
        with:
          name: Schoolday.Polaris.DependencyInjection
          path: Apache.Druid.Querying.Microsoft.Extensions.DependencyInjection/bin/Release/*.nupkg

  release:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/master' && github.event_name == 'workflow_dispatch' # only run job if on the main branch and on manual trigger
    
    steps:
      # Push main NuGet package to GitHub packages
      - name: Download main nuget package artifact
        uses: actions/download-artifact@v4.6.0
        with:
          name: Schoolday.Polaris.Querying
          path: main_package
      - name: Download DI nuget package artifact
        uses: actions/download-artifact@v4.6.0
        with:
          name: Schoolday.Polaris.DependencyInjection
          path: di_package
      - name: Add NuGet source
        run: dotnet nuget add source --username edutone --password ${{ secrets.GITHUB_TOKEN }} --store-password-in-clear-text --name github "https://nuget.pkg.github.com/edutone/index.json"
      - name: Push main package to the GitHub Packages
        if: needs.build.outputs.CommitsSinceVersionSource > 0 # Only release if there has been a commit/version change  
        run: dotnet nuget push main_package/*.nupkg --api-key ${{ secrets.GITHUB_TOKEN }} --source "github"
      - name: Push DI package to the GitHub Packages
        if: needs.build.outputs.CommitsSinceVersionSource > 0 # Only release if there has been a commit/version change  
        run: dotnet nuget push di_package/*.nupkg --api-key ${{ secrets.GITHUB_TOKEN }} --source "github"
      
      # Create release
      - name: Create Release
        if: needs.build.outputs.CommitsSinceVersionSource > 0 # only release if there has been a commit/version change
        uses: ncipollo/release-action@v1.15.0
        with:
          tag: ${{ needs.build.outputs.Version }}
          name: ${{ needs.build.outputs.Version }}
          artifacts: "main_package/*,di_package/*"
          token: ${{ secrets.GITHUB_TOKEN }}
